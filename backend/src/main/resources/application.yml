server:
  port: 8222
  servlet:
    session:
      cookie:
        name: JSESSIONID
        same-site: lax

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: seckill-mall
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # allowPublicKeyRetrieval：MySQL 8 默认 caching_sha2_password，未走 SSL 时需允许客户端向服务端索取公钥，否则报 Public Key Retrieval is not allowed
    url: jdbc:mysql://localhost:3306/seckill_mall?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password:
    lettuce:
      pool:
        max-active: 32
        max-idle: 16
        min-idle: 4
  session:
    store-type: redis
    redis:
      namespace: spring:session
    timeout: 30m
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

app:
  upload:
    # 相对进程工作目录（一般在 backend 下执行时即为 backend/upload）
    root: upload
  ai:
    openai-enabled: true
    openai-api-key: "sk-6fd9ef79d6274803a580fc37f3b1b7c5"
    openai-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    openai-model: qwen-turbo

seckill:
  rate-limit:
    user-limit: 5
    user-period-seconds: 60
    ip-limit: 10
    ip-period-seconds: 60
  monitor:
    high-qps-threshold: 200
    stock-mismatch-threshold: 10
    lua-error-consecutive: 5

logging:
  level:
    com.seckill: INFO
